<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390px, initial-scale=1.0" />
  <title>PaperBrush — Celebration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1B2A4A;
      --teal:    #0EA5A0;
      --coral:   #F06449;
      --gold:    #F5A623;
      --sky:     #6BB8E8;
      --sage:    #7CB686;
    }

    /* ─── Page shell ─────────────────────────────────────── */
    html, body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      padding: 48px;
      align-items: flex-start;
      justify-content: center;
      background: #1A1714;
      font-family: 'Nunito Sans', sans-serif;
    }

    .device-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .device-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      color: #666;
      letter-spacing: 0.04em;
    }

    /* ─── iPhone shell ───────────────────────────────────── */
    .iphone {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #111;
      box-shadow:
        0 24px 80px rgba(0,0,0,0.6),
        inset 0 0 0 2px #2a2a2a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    /* Dynamic island */
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #111;
      border-radius: 20px;
      z-index: 30;
    }

    /* ─── Screen — Deep Navy bg ──────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
      background: var(--navy);
    }

    /* ─── Status bar (light on dark) ────────────────────── */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 54px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      z-index: 20;
    }
    .status-time {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: rgba(255,255,255,0.85);
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .status-icons svg { fill: rgba(255,255,255,0.75); }

    /* ─── ARTWORK CONTAINER ──────────────────────────────── */
    .artwork-wrap {
      position: absolute;
      top: 54px;       /* below status bar */
      left: 32px;
      right: 32px;
      /* leave room for overlay at bottom; artwork is tall */
      bottom: 210px;
      border-radius: 16px;
      overflow: hidden;
      /* Teal glow frame */
      box-shadow:
        0 0 0 3px var(--teal),
        0 0 20px 8px rgba(14,165,160,0.40);
      z-index: 2;
    }

    .artwork-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 14px;
    }

    /* ─── CONFETTI / SPARKLES ────────────────────────────── */
    .confetti-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      border-radius: 48px;
      overflow: hidden;
    }

    /* Each sparkle is absolutely positioned */
    .sp {
      position: absolute;
    }

    /* ─── GRADIENT OVERLAY (bottom 40%) ─────────────────── */
    .gradient-overlay {
      position: absolute;
      left: 0; right: 0;
      bottom: 0;
      height: 380px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(27,42,74,0.55) 30%,
        rgba(27,42,74,0.92) 55%,
        var(--navy) 75%
      );
      z-index: 4;
      border-radius: 0 0 48px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 40px;
    }

    /* ─── CELEBRATION TEXT ───────────────────────────────── */
    .celebration-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 28px;
      color: #ffffff;
      text-align: center;
      letter-spacing: -0.3px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.30);
      line-height: 1.2;
    }

    /* ─── ACTION BUTTONS ─────────────────────────────────── */
    .action-buttons {
      display: flex;
      gap: 12px;
      width: 100%;
      padding: 0 24px;
      margin-top: 16px;
    }
    .btn {
      flex: 1;
      height: 48px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #ffffff;
      transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.14s ease;
    }
    .btn:active {
      transform: scale(0.96);
    }
    .btn-save {
      background: var(--teal);
      box-shadow: 0 4px 16px rgba(14,165,160,0.35);
    }
    .btn-share {
      background: var(--coral);
      box-shadow: 0 4px 16px rgba(240,100,73,0.35);
    }

    /* ─── COLOR ANOTHER LINK ─────────────────────────────── */
    .color-another {
      margin-top: 16px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: rgba(255,255,255,0.70);
      text-align: center;
      cursor: pointer;
      letter-spacing: 0.01em;
    }

    /* ─── REPLAY BUTTON (top right) ─────────────────────── */
    .replay-btn {
      position: absolute;
      top: 62px;    /* below status bar + some padding */
      right: 16px;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(14,165,160,0.20);
      box-shadow: 0 4px 16px rgba(27,42,74,0.10);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: background 0.15s;
    }
    .replay-btn:hover { background: rgba(14,165,160,0.32); }
    .replay-btn svg {
      width: 18px; height: 18px;
      stroke: var(--teal);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    /* ─── Entrance animations ────────────────────────────── */
    @keyframes fadeIn    { from { opacity:0 }              to { opacity:1 } }
    @keyframes scaleUp   { from { opacity:0; transform:scale(0.9) }  to { opacity:1; transform:scale(1) } }
    @keyframes slideUp   { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
    @keyframes popStar   { 0%{opacity:0;transform:scale(0) rotate(0deg)} 60%{transform:scale(1.2) rotate(20deg)} 100%{opacity:1;transform:scale(1) rotate(0deg)} }

    .artwork-wrap     { animation: scaleUp 0.5s cubic-bezier(0.34,1.3,0.64,1) 0.1s both; }
    .replay-btn       { animation: fadeIn  0.4s ease 0.25s both; }
    .gradient-overlay { animation: fadeIn  0.5s ease 0.3s  both; }
    .celebration-text { animation: slideUp 0.45s ease 0.45s both; }
    .action-buttons   { animation: slideUp 0.45s ease 0.55s both; }
    .color-another    { animation: slideUp 0.45s ease 0.62s both; }

    .sp { animation: popStar 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
    .sp:nth-child(1)  { animation-delay: 0.35s; }
    .sp:nth-child(2)  { animation-delay: 0.40s; }
    .sp:nth-child(3)  { animation-delay: 0.42s; }
    .sp:nth-child(4)  { animation-delay: 0.45s; }
    .sp:nth-child(5)  { animation-delay: 0.38s; }
    .sp:nth-child(6)  { animation-delay: 0.50s; }
    .sp:nth-child(7)  { animation-delay: 0.44s; }
    .sp:nth-child(8)  { animation-delay: 0.48s; }
    .sp:nth-child(9)  { animation-delay: 0.52s; }
    .sp:nth-child(10) { animation-delay: 0.36s; }
    .sp:nth-child(11) { animation-delay: 0.54s; }
    .sp:nth-child(12) { animation-delay: 0.46s; }
    .sp:nth-child(13) { animation-delay: 0.58s; }
    .sp:nth-child(14) { animation-delay: 0.43s; }
    .sp:nth-child(15) { animation-delay: 0.60s; }
    .sp:nth-child(16) { animation-delay: 0.56s; }
  </style>
</head>
