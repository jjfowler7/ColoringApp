<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390px, initial-scale=1.0" />
  <title>PaperBrush — PDF Export</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:     #FFF8F0;
      --canvas-bg: #FFFDF9;
      --teal:      #0EA5A0;
      --navy:      #1B2A4A;
      --coral:     #F06449;
      --gold:      #F5A623;
      --secondary: #666666;
      --divider:   #E8E0D8;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      padding: 48px;
      align-items: flex-start;
      justify-content: center;
      background: #C8C0AE;
      font-family: 'Nunito Sans', sans-serif;
    }

    .device-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .device-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
    }

    /* ─── iPhone shell ───────────────────────────────────── */
    .iphone {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #1a1a1a;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 0 0 2px #3a3a3a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 50;
    }

    /* ─── Screen ─────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
      background: var(--cream);
      display: flex;
      flex-direction: column;
    }

    /* ════════════════════════════════════════════════════════
       GALLERY FULLSCREEN VIEWER (simplified background)
       ════════════════════════════════════════════════════════ */

    .gallery-bg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--canvas-bg);
      overflow: hidden;
      position: relative;
    }

    /* Sleeping lion artwork (simplified) */
    .lion-artwork {
      width: 280px;
      height: 320px;
    }

    /* ════════════════════════════════════════════════════════
       SCRIM
       ════════════════════════════════════════════════════════ */
    .scrim {
      position: absolute;
      inset: 0;
      background: rgba(27,42,74,0.45);
      z-index: 10;
      border-radius: 48px;
    }

    /* ════════════════════════════════════════════════════════
       BOTTOM SHEET
       ════════════════════════════════════════════════════════ */
    .sheet {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: #ffffff;
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -16px 48px rgba(27,42,74,0.18);
      z-index: 20;
      padding: 0 0 34px;
      max-height: 60%;
      overflow-y: auto;
      animation: sheetUp 0.42s cubic-bezier(0.34,1.15,0.64,1) both;
    }

    @keyframes sheetUp {
      from { transform: translateY(100%); opacity: 0.7; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Drag handle */
    .drag-handle {
      width: 36px; height: 5px;
      background: var(--divider);
      border-radius: 9999px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    /* Sheet inner content */
    .sheet-body {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
    }

    /* Gap utility */
    .gap-8  { height: 8px;  flex-shrink: 0; }
    .gap-12 { height: 12px; flex-shrink: 0; }
    .gap-16 { height: 16px; flex-shrink: 0; }

    /* Sheet headline */
    .sheet-headline {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--navy);
      text-align: left;
      letter-spacing: -0.2px;
      margin-top: 16px;
      margin-bottom: 16px;
    }

    /* Frame selector row */
    .frame-selector {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 8px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }
    .frame-selector::-webkit-scrollbar { display: none; }

    .frame-thumbnail {
      width: 80px;
      height: 100px;
      flex-shrink: 0;
      background: #ffffff;
      border: 2px solid transparent;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }
    .frame-thumbnail:active {
      transform: scale(0.96);
    }

    /* Selected frame state */
    .frame-thumbnail.selected {
      border-color: var(--teal);
    }

    /* Selection indicator dot */
    .frame-dot {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: var(--teal);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .frame-thumbnail.selected .frame-dot {
      opacity: 1;
    }

    /* Frame preview content */
    .frame-preview {
      width: 60px;
      height: 75px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 11px;
      color: var(--secondary);
    }

    /* Frame styles */
    .frame-classic {
      border: 3px double var(--gold);
      box-shadow: inset 0 0 0 1px var(--gold);
    }
    .frame-nature {
      border: 2px solid #7CB686;
      box-shadow: inset 0 0 0 1px #7CB686;
      background: rgba(124, 182, 134, 0.05);
    }
    .frame-stars {
      border: 2px solid var(--navy);
      background: linear-gradient(135deg, #1B2A4A 0%, #0EA5A0 100%);
      color: #ffffff;
    }
    .frame-rainbow {
      border: 3px solid transparent;
      background: linear-gradient(#ffffff, #ffffff) padding-box,
                  linear-gradient(90deg, #FF6B6B, #FFD93D, #6BCB77, #4D96FF, #A78BFA) border-box;
    }
    .frame-minimal {
      border: 1px solid var(--secondary);
    }

    /* Frame label */
    .frame-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 10px;
      color: var(--secondary);
      margin-top: 4px;
      text-align: center;
      white-space: nowrap;
    }

    /* Artist name label */
    .artist-label {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: var(--secondary);
      margin-top: 16px;
      margin-bottom: 8px;
    }

    /* Text input */
    .artist-input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--divider);
      border-radius: 10px;
      padding: 0 12px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 16px;
      color: var(--navy);
      background: #ffffff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .artist-input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(14, 165, 160, 0.1);
    }

    /* PDF preview box */
    .pdf-preview {
      width: 100%;
      height: 200px;
      background: #ffffff;
      border: 1px solid var(--divider);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 16px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    /* PDF preview inner frame and artwork */
    .pdf-frame {
      width: 90%;
      height: 90%;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Frame styles for preview */
    .pdf-frame.classic {
      border: 2px double var(--gold);
      box-shadow: inset 0 0 0 1px var(--gold);
    }
    .pdf-frame.rainbow {
      border: 2px solid transparent;
      background: linear-gradient(#ffffff, #ffffff) padding-box,
                  linear-gradient(90deg, #FF6B6B, #FFD93D, #6BCB77, #4D96FF, #A78BFA) border-box;
    }

    /* Artwork preview (simplified sleeping lion) */
    .artwork-preview {
      width: 60px;
      height: 50px;
      margin-bottom: 4px;
    }

    /* Artist credit text */
    .pdf-credit {
      font-family: 'Georgia', serif;
      font-size: 11px;
      color: var(--secondary);
      margin-top: 4px;
    }

    /* Date small text */
    .pdf-date {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 8px;
      color: var(--divider);
      margin-top: 2px;
    }

    /* Share/Print button */
    .btn-share {
      width: 100%;
      height: 48px;
      background: var(--teal);
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(14, 165, 160, 0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #ffffff;
      transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.14s ease;
    }
    .btn-share:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(14, 165, 160, 0.18);
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     IPHONE 1: FRAME PICKER — CLASSIC SELECTED
     ════════════════════════════════════════════════════════ -->
<div class="device-wrap">
  <div class="iphone">
    <div class="screen">

      <!-- Gallery fullscreen viewer background -->
      <div class="gallery-bg">
        <!-- Simplified Sleeping Lion artwork -->
        <svg class="lion-artwork" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Sky background -->
          <rect width="120" height="120" fill="#A8D4E8"/>
          <!-- Grass -->
          <rect x="0" y="90" width="120" height="30" fill="#7CB686"/>
          <!-- Mane -->
          <circle cx="60" cy="50" r="30" fill="none" stroke="#D4811A" stroke-width="3"/>
          <!-- Head -->
          <ellipse cx="60" cy="50" rx="18" ry="16" fill="none" stroke="#D4811A" stroke-width="2.5"/>
          <!-- Body -->
          <ellipse cx="60" cy="75" rx="22" ry="16" fill="none" stroke="#D4811A" stroke-width="2.5"/>
          <!-- Eyes closed -->
          <path d="M50 48 Q54 45 58 48" fill="none" stroke="#D4811A" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M62 48 Q66 45 70 48" fill="none" stroke="#D4811A" stroke-width="1.8" stroke-linecap="round"/>
          <!-- Nose -->
          <ellipse cx="60" cy="55" rx="4" ry="3" fill="none" stroke="#D4811A" stroke-width="1.5"/>
          <!-- Paws -->
          <ellipse cx="44" cy="88" rx="8" ry="5" fill="none" stroke="#D4811A" stroke-width="2"/>
          <ellipse cx="76" cy="88" rx="8" ry="5" fill="none" stroke="#D4811A" stroke-width="2"/>
        </svg>
      </div>

    </div>

    <!-- Scrim -->
    <div class="scrim"></div>

    <!-- Frame picker sheet -->
    <div class="sheet">
      <div class="drag-handle"></div>

      <div class="sheet-body">

        <!-- Title -->
        <div class="sheet-headline">Choose a frame</div>

        <!-- Frame selector row -->
        <div class="frame-selector">
          <!-- Classic (selected) -->
          <div class="frame-thumbnail selected">
            <div class="frame-preview frame-classic"></div>
            <div class="frame-label">Classic</div>
            <div class="frame-dot"></div>
          </div>

          <!-- Nature -->
          <div class="frame-thumbnail">
            <div class="frame-preview frame-nature"></div>
            <div class="frame-label">Nature</div>
            <div class="frame-dot"></div>
          </div>

          <!-- Stars -->
          <div class="frame-thumbnail">
            <div class="frame-preview frame-stars">★</div>
            <div class="frame-label">Stars</div>
            <div class="frame-dot"></div>
          </div>

          <!-- Rainbow -->
          <div class="frame-thumbnail">
            <div class="frame-preview frame-rainbow"></div>
            <div class="frame-label">Rainbow</div>
            <div class="frame-dot"></div>
          </div>

          <!-- Minimal -->
          <div class="frame-thumbnail">
            <div class="frame-preview frame-minimal"></div>
            <div class="frame-label">Minimal</div>
            <div class="frame-dot"></div>
          </div>
        </div>

        <!-- Artist name section -->
        <div class="artist-label">Artist name</div>
        <input type="text" class="artist-input" value="Alex" />

        <div class="gap-12"></div>

        <!-- PDF preview -->
        <div class="pdf-preview">
          <div class="pdf-frame classic">
            <!-- Simplified artwork in preview -->
            <svg class="artwork-preview" viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="80" height="60" fill="#A8D4E8"/>
              <rect x="0" y="45" width="80" height="15" fill="#7CB686"/>
              <circle cx="40" cy="35" r="15" fill="none" stroke="#D4811A" stroke-width="1.5"/>
              <ellipse cx="40" cy="45" rx="14" ry="10" fill="none" stroke="#D4811A" stroke-width="1.5"/>
              <circle cx="32" cy="32" r="4" fill="none" stroke="#D4811A" stroke-width="1"/>
              <circle cx="48" cy="32" r="4" fill="none" stroke="#D4811A" stroke-width="1"/>
            </svg>
            <div class="pdf-credit">By Alex</div>
            <div class="pdf-date">Mar 19, 2026</div>
          </div>
        </div>

        <!-- Share button -->
        <button class="btn-share">Share / Print</button>

        <div class="gap-16"></div>

      </div>
    </div>

  </div>
  <div class="device-label">Frame Picker Sheet</div>
</div>

<!-- ════════════════════════════════════════════════════════
     IPHONE 2: FRAME PICKER — RAINBOW SELECTED
     ════════════════════════════════════════════════════════ -->
<div class="device-wrap">

        <svg class="lion-artwork" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">

          <!-- Nose -->
          <ellipse cx="60" cy="55" rx="4" ry="3" fill="none" stroke="#D4811A" stroke-width="1.5"/>

          <ellipse cx="44" cy="88" rx="8" ry="5" fill="none" stroke="#D4811A" stroke-width="2"/>

        </svg>

    <!-- Scrim -->
    <div class="scrim"></div>

    <!-- Frame picker sheet -->
    <div class="sheet">

      <div class="sheet-body">

        <!-- Title -->
        <div class="sheet-headline">Choose a frame</div>

        <!-- Frame selector row -->
        <div class="frame-selector">
          <!-- Classic -->
          <div class="frame-thumbnail">

          <div class="frame-thumbnail">

          <div class="frame-thumbnail">

          <div class="frame-thumbnail selected">

        <!-- PDF preview with rainbow frame -->
        <div class="pdf-preview">
          <div class="pdf-frame rainbow">
            <!-- Simplified artwork in preview -->
            <svg class="artwork-preview" viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="80" height="60" fill="#A8D4E8"/>
              <rect x="0" y="45" width="80" height="15" fill="#7CB686"/>

            <div class="pdf-credit">By Alex</div>

        </div>

        <!-- Share button -->

      </div>
    </div>

  </div>
  <div class="device-label">Rainbow frame selected</div>
</div>

</body>
</html>
