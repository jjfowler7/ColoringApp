<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390px, initial-scale=1.0" />
  <title>PaperBrush — Pass & Play Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:     #FFF8F0;
      --canvas-bg: #FFFDF9;
      --teal:      #0EA5A0;
      --navy:      #1B2A4A;
      --coral:     #F06449;
      --gold:      #F5A623;
      --sky:       #6BB8E8;
      --sage:      #7CB686;
      --secondary: #666666;
      --divider:   #E8E0D8;
      --peach:     #FCBFA0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      padding: 48px;
      align-items: flex-start;
      justify-content: center;
      background: #C8C0AE;
      font-family: 'Nunito Sans', sans-serif;
    }

    .device-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .device-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
    }

    /* ─── iPhone shell ───────────────────────────────────── */
    .iphone {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #1a1a1a;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 0 0 2px #3a3a3a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 30;
    }

    /* ─── Screen ─────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
      background: var(--canvas-bg);
      display: flex;
      flex-direction: column;
    }

    /* ─── Status bar ─────────────────────────────────────── */
    .status-bar {
      height: 54px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      background: var(--canvas-bg);
      z-index: 20;
    }
    .status-time {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--navy);
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .status-icons svg { fill: var(--navy); }

    /* ─── Canvas area background ─────────────────────────── */
    .canvas-bg {
      position: absolute;
      inset: 54px 0 0 0;
      background: #ffffff;
      z-index: -1;
      overflow: hidden;
    }
    .canvas-bg svg {
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.3;
    }

    /* Overlay dimming */
    .dimmed-overlay {
      position: absolute;
      inset: 54px 0 0 0;
      background: rgba(27, 42, 74, 0.30);
      z-index: 1;
    }

    /* ─── Bottom Sheet (Modal) ────────────────────────────── */
    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80%;
      background: #ffffff;
      border-radius: 24px 24px 0 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 0;
    }

    .drag-handle {
      width: 36px;
      height: 5px;
      background: var(--divider);
      border-radius: 9999px;
      margin: 0 auto 16px;
      flex-shrink: 0;
    }

    /* ─── Sheet Title ─────────────────────────────────────── */
    .sheet-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: var(--navy);
      padding: 0 0 20px 0;
      flex-shrink: 0;
    }

    /* ─── Player Section ──────────────────────────────────── */
    .player-section {
      flex-shrink: 0;
      margin-bottom: 16px;
    }

    .player-label {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .avatar-grid {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .avatar:active { transform: scale(0.9); }

    .avatar.bear { background: #8B6F47; }
    .avatar.cat { background: #E8854A; }
    .avatar.owl { background: #9B7C9B; }
    .avatar.fox { background: #ED8936; }
    .avatar.rabbit { background: #F0A8D0; }
    .avatar.penguin { background: #5B7C99; }
    .avatar.lion { background: #F5A623; }
    .avatar.frog { background: #7CB686; }

    .avatar.selected {
      border-color: var(--teal);
      box-shadow: 0 0 0 1px rgba(14, 165, 160, 0.3);
    }

    .player-input {
      width: 100%;
      padding: 0 16px;
      height: 44px;
      border: 1px solid var(--divider);
      border-radius: 10px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 16px;
      color: var(--navy);
      background: #ffffff;
      font-weight: 400;
    }

    .player-input::placeholder {
      color: #999;
    }

    .player-input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(14, 165, 160, 0.1);
    }

    /* ─── Add Player ───────────────────────────────────────── */
    .add-player-link {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--teal);
      text-align: center;
      cursor: pointer;
      padding: 12px 0;
      margin-bottom: 16px;
    }

    .add-player-count {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: var(--teal);
      color: #ffffff;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      line-height: 20px;
      text-align: center;
      margin-left: 4px;
    }

    /* ─── Turn Time ───────────────────────────────────────– */
    .turn-time-section {
      flex-shrink: 0;
      margin-bottom: 20px;
    }

    .turn-time-label {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .segmented-control {
      display: flex;
      gap: 0;
      height: 40px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--divider);
    }

    .seg-button {
      flex: 1;
      border: none;
      background: #ffffff;
      border-right: 1px solid var(--divider);
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--secondary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .seg-button:last-child {
      border-right: none;
    }

    .seg-button.selected {
      background: var(--teal);
      color: #ffffff;
    }

    /* ─── Start Button ────────────────────────────────────── */
    .start-button {
      width: 100%;
      height: 48px;
      margin-top: auto;
      flex-shrink: 0;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .start-button.enabled {
      background: var(--teal);
      color: #ffffff;
      box-shadow: 0 4px 16px rgba(14, 165, 160, 0.25);
    }

    .start-button.enabled:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(14, 165, 160, 0.15);
    }

    .start-button.disabled {
      background: transparent;
      color: #999;
      opacity: 0.4;
      cursor: not-allowed;
      border: 1px solid var(--divider);
    }

    /* ─── Bottom safe area ───────────────────────────────– */
    .safe-area-bottom {
      height: 34px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .home-indicator {
      width: 120px;
      height: 5px;
      background: var(--navy);
      border-radius: 9999px;
      opacity: 0.18;
    }
  </style>
</head>
