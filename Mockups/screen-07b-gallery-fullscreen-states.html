<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390px, initial-scale=1.0" />
  <title>PaperBrush — Gallery Fullscreen States</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design tokens ──────────────────────────────────── */
    :root {
      --cream:     #FFF8F0;
      --canvas-bg: #FFFDF9;
      --teal:      #0EA5A0;
      --navy:      #1B2A4A;
      --coral:     #F06449;
      --gold:      #F5A623;
      --sage:      #7CB686;
      --lavender:  #B8A9E8;
      --sky:       #6BB8E8;
      --peach:     #FCBFA0;
      --secondary: #666666;
      --divider:   #E8E0D8;
    }

    /* ─── Page shell ─────────────────────────────────────── */
    html, body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      padding: 48px;
      align-items: flex-start;
      justify-content: center;
      background: #C8C0AE;
      font-family: 'Nunito Sans', sans-serif;
    }

    .device-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .device-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
      max-width: 220px;
      text-align: center;
    }

    /* ─── iPhone shell ───────────────────────────────────── */
    .iphone {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #1a1a1a;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 0 0 2px #3a3a3a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 30;
    }

    /* ─── Screen ─────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      flex-direction: column;
    }

    /* ─── Status bar ─────────────────────────────────────── */
    .status-bar {
      height: 54px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      background: #ffffff;
      border-bottom: 1px solid var(--divider);
      z-index: 20;
    }
    .status-time {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--navy);
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .status-icons svg { fill: var(--navy); }

    /* ─── TOP BAR (Fullscreen viewer toolbar) ─────────────── */
    .top-bar {
      height: 44px;
      flex-shrink: 0;
      background: #ffffff;
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      padding: 0 16px;
      position: relative;
      z-index: 10;
      justify-content: space-between;
    }
    .bar-back {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      margin: -16px 0 -16px -16px;
      cursor: pointer;
      border-radius: 9999px;
    }
    .bar-back svg {
      width: 18px; height: 18px;
      stroke: var(--navy);
      stroke-width: 2.5;
      stroke-linecap: round; stroke-linejoin: round;
      fill: none;
    }
    .bar-icons {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bar-icon {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 9999px;
      margin: -16px -16px -16px 0;
    }
    .bar-icon svg {
      width: 18px; height: 18px;
      stroke: var(--navy);
      stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      fill: none;
    }
    .bar-icon.muted svg {
      stroke: var(--secondary);
      opacity: 0.4;
    }

    /* ─── ARTWORK AREA ───────────────────────────────────── */
    .artwork-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }
    .artwork-area::-webkit-scrollbar { display: none; }

    .artwork-container {
      width: 100%;
      aspect-ratio: 1 / 1.2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .artwork-svg {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(27,42,74,0.12);
    }

    /* Half-colored variant */
    .artwork-svg.half-colored {
      background: linear-gradient(90deg, #e8e0d8 50%, transparent 50%);
    }

    /* ─── BOTTOM INFO STRIP ──────────────────────────────── */
    .info-strip {
      height: 120px;
      flex-shrink: 0;
      background: linear-gradient(
        to bottom,
        rgba(27,42,74,0.3) 0%,
        rgba(27,42,74,0.7) 60%,
        #1B2A4A 100%
      );
      padding: 24px 16px 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      z-index: 5;
    }

    .info-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .info-meta {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: var(--secondary);
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .info-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .info-status {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: var(--secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
    }

    .continue-btn {
      background: var(--teal);
      color: #ffffff;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.14s ease;
      box-shadow: 0 4px 12px rgba(14,165,160,0.25);
    }
    .continue-btn:active {
      transform: scale(0.96);
    }

    /* ─── ALERT DIALOG ───────────────────────────────────── */
    .alert-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 50;
    }

    .alert-dialog {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 51;
    }

    .alert-content {
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
      width: 270px;
      overflow: hidden;
    }

    .alert-body {
      padding: 24px 20px;
      text-align: center;
    }

    .alert-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 17px;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .alert-message {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: var(--secondary);
      line-height: 1.4;
    }

    .alert-divider {
      height: 1px;
      background: var(--divider);
    }

    .alert-buttons {
      display: flex;
    }

    .alert-button {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 17px;
      color: var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--divider);
    }
    .alert-button:last-child {
      border-right: none;
    }
    .alert-button.destructive {
      color: var(--coral);
    }

    /* ─── Entrance animations ────────────────────────────– */
    @keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
    @keyframes scaleUp   { from { opacity:0; transform:scale(0.95) } to { opacity:1; transform:scale(1) } }

    .top-bar       { animation: fadeIn  0.3s ease 0.05s both; }
    .artwork-area  { animation: fadeIn  0.35s ease 0.1s both; }
    .info-strip    { animation: fadeIn  0.35s ease 0.15s both; }
  </style>
</head>
<body>
