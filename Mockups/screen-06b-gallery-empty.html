<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390px, initial-scale=1.0" />
  <title>PaperBrush — Gallery Empty State</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design tokens ──────────────────────────────────── */
    :root {
      --cream:     #FFF8F0;
      --canvas-bg: #FFFDF9;
      --teal:      #0EA5A0;
      --navy:      #1B2A4A;
      --coral:     #F06449;
      --gold:      #F5A623;
      --sage:      #7CB686;
      --lavender:  #B8A9E8;
      --sky:       #6BB8E8;
      --peach:     #FCBFA0;
      --secondary: #666666;
      --divider:   #E8E0D8;
    }

    /* ─── Page shell ─────────────────────────────────────── */
    html, body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      padding: 48px;
      align-items: flex-start;
      justify-content: center;
      background: #C8C0AE;
      font-family: 'Nunito Sans', sans-serif;
    }

    .device-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .device-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
      max-width: 220px;
      text-align: center;
    }

    /* ─── iPhone shell ───────────────────────────────────── */
    .iphone {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #1a1a1a;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 0 0 2px #3a3a3a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 30;
    }

    /* ─── Screen ─────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
      background: var(--cream);
      display: flex;
      flex-direction: column;
    }

    /* ─── Status bar ─────────────────────────────────────── */
    .status-bar {
      height: 54px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      background: var(--canvas-bg);
      z-index: 20;
    }
    .status-time {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--navy);
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .status-icons svg { fill: var(--navy); }

    /* ─── TOP BAR ────────────────────────────────────────── */
    .top-bar {
      height: 44px;
      flex-shrink: 0;
      background: var(--canvas-bg);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      padding: 0 16px;
      position: relative;
      z-index: 10;
      justify-content: space-between;
    }
    .bar-back {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border-radius: 9999px;
    }
    .bar-back svg {
      width: 18px; height: 18px;
      stroke: var(--teal);
      stroke-width: 2.5;
      stroke-linecap: round; stroke-linejoin: round;
      fill: none;
    }
    .bar-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--navy);
      letter-spacing: -0.2px;
    }
    .bar-right {
      width: 44px; height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 9999px;
    }
    .bar-right svg {
      width: 20px; height: 20px;
      stroke: var(--teal);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    /* ─── SCROLLABLE BODY ────────────────────────────────── */
    .scroll-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      min-height: 0;
    }
    .scroll-body::-webkit-scrollbar { display: none; }

    /* ─── Empty state ────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 32px;
      text-align: center;
    }
    .empty-icon {
      width: 160px;
      height: 160px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .empty-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .empty-subtitle {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 15px;
      color: var(--secondary);
      margin-bottom: 32px;
      line-height: 1.4;
    }
    .browse-btn {
      background: var(--teal);
      color: #ffffff;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      width: calc(100% - 64px);
      max-width: 280px;
      transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.14s ease;
      box-shadow: 0 4px 12px rgba(14,165,160,0.25);
    }
    .browse-btn:active {
      transform: scale(0.96);
    }
    .browse-btn:hover {
      box-shadow: 0 6px 16px rgba(14,165,160,0.32);
    }

    /* ─── PAGE GRID (for context menu example) ────────────– */
    .page-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px 16px 32px;
    }

    .page-card {
      background: var(--canvas-bg);
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(27,42,74,0.06);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.18s ease;
    }
    .page-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(27,42,74,0.10);
    }
    .page-card.pressed {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(27,42,74,0.15);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 3 / 3.6;
      background: #ffffff;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-thumb svg {
      width: 86%;
      height: 86%;
    }

    .card-info {
      padding: 10px 12px 11px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .card-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--navy);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-tier {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .tier-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tier-label {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 11px;
      line-height: 1;
    }

    /* ─── Context Menu ───────────────────────────────────── */
    .context-menu {
      position: absolute;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      z-index: 20;
      min-width: 180px;
      overflow: hidden;
    }

    .context-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.15);
      backdrop-filter: blur(4px);
      z-index: 15;
    }

    .context-item {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 44px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 16px;
      color: var(--navy);
      cursor: pointer;
      border-bottom: 0.5px solid var(--divider);
    }
    .context-item:last-child {
      border-bottom: none;
    }
    .context-item.destructive {
      color: var(--coral);
    }

    .context-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    /* ─── Bottom safe area ───────────────────────────────── */
    .safe-area {
      height: 34px; flex-shrink: 0;
      background: var(--cream);
      display: flex; align-items: center; justify-content: center;
    }
    .home-indicator {
      width: 120px; height: 5px;
      background: var(--navy);
      border-radius: 9999px;
      opacity: 0.18;
    }

    /* ─── Entrance animations ────────────────────────────– */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
    @keyframes popIn    { from { opacity:0; transform:scale(0.94) } to { opacity:1; transform:scale(1) } }

    .top-bar       { animation: fadeDown 0.3s ease 0.05s both; }

    .page-card:nth-child(1) { animation: popIn 0.4s cubic-bezier(0.34,1.3,0.64,1) 0.22s both; }
    .page-card:nth-child(2) { animation: popIn 0.4s cubic-bezier(0.34,1.3,0.64,1) 0.28s both; }
    .page-card:nth-child(3) { animation: popIn 0.4s cubic-bezier(0.34,1.3,0.64,1) 0.34s both; }
    .page-card:nth-child(4) { animation: popIn 0.4s cubic-bezier(0.34,1.3,0.64,1) 0.40s both; }
  </style>
</head>
<body>

        <div class="context-item">
          <div class="context-icon">🖨</div>
          <span>Print</span>
        </div>
        <div class="context-item destructive">
          <div class="context-icon">🗑</div>

      <div class="safe-area"><div class="home-indicator"></div></div>

    </div><!-- /screen -->

</div>
