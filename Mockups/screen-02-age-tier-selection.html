<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390px, initial-scale=1.0" />
  <title>PaperBrush — Age Tier Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design tokens ──────────────────────────────────── */
    :root {
      --cream:     #FFF8F0;
      --canvas:    #FFFDF9;
      --teal:      #0EA5A0;
      --navy:      #1B2A4A;
      --coral:     #F06449;
      --gold:      #F5A623;
      --secondary: #666666;
      --border:    #E8E0D8;

      /* tier accents */
      --starter-accent:  #F06449;
      --starter-tint:    rgba(252,191,160,0.20);
      --explorer-accent: #0EA5A0;
      --explorer-tint:   rgba(107,184,232,0.20);
      --creator-accent:  #1B2A4A;
      --creator-tint:    rgba(184,169,232,0.20);
    }

    /* ─── Page / shell ───────────────────────────────────── */
    html, body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      padding: 48px;
      align-items: flex-start;
      justify-content: center;
      background: #D4CCB8;
      font-family: 'Nunito Sans', sans-serif;
    }

    /* ─── Device wrapper ─────────────────────────────────── */
    .device-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .device-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
    }

    /* ─── iPhone shell ───────────────────────────────────── */
    .iphone {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #1a1a1a;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 0 0 2px #3a3a3a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Dynamic island */
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 30;
    }

    /* ─── Screen ─────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
      background: var(--cream);
      display: flex;
      flex-direction: column;
    }

    /* ─── Status bar ─────────────────────────────────────── */
    .status-bar {
      height: 54px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      z-index: 20;
    }
    .status-time {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--navy);
    }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-icons svg {
      width: 16px;
      height: 12px;
      fill: var(--navy);
    }

    /* ─── Scrollable content area ────────────────────────── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      /* hide scrollbar inside device preview */
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ─── Header ─────────────────────────────────────────── */
    .screen-header {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 28px;
      line-height: 1.2;
      color: var(--navy);
      text-align: center;
      letter-spacing: -0.3px;
    }

    /* ─── Cards container ────────────────────────────────── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 32px;
    }

    /* ─── Tier card base ─────────────────────────────────── */
    .tier-card {
      height: 100px;
      border-radius: 24px;
      background: var(--canvas);
      box-shadow: 0 4px 16px rgba(27,42,74,0.10);
      display: flex;
      align-items: stretch;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.16s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.16s ease;
      -webkit-tap-highlight-color: transparent;
      border: none;
      text-align: left;
      width: 100%;
      padding: 0;
    }
    .tier-card:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(27,42,74,0.08);
    }
    .tier-card:hover {
      transform: scale(1.015);
      box-shadow: 0 6px 20px rgba(27,42,74,0.13);
    }

    /* Tinted background wash — covers the whole card */
    .tier-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--tint);
      border-radius: 24px;
      pointer-events: none;
      z-index: 0;
    }

    /* Left accent border */
    .tier-card::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--accent);
      border-radius: 24px 0 0 24px;
      z-index: 2;
    }

    /* ─── Card sections ──────────────────────────────────── */
    .card-icon-well {
      width: 80px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .card-icon-well svg {
      width: 48px;
      height: 48px;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 16px 0 0;
      position: relative;
      z-index: 1;
    }

    .card-tier-name {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 20px;
      line-height: 1.2;
      color: var(--navy);
    }
    .card-age {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      line-height: 1.3;
      color: var(--accent);
      margin-top: 2px;
    }
    .card-desc {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.4;
      color: var(--secondary);
      margin-top: 4px;
    }

    /* Chevron hint on right */
    .card-chevron {
      width: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      opacity: 0.35;
    }
    .card-chevron svg {
      width: 12px;
      height: 20px;
      stroke: var(--navy);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ─── Tier-specific color vars ───────────────────────── */
    .starter  { --accent: var(--starter-accent);  --tint: var(--starter-tint);  }
    .explorer { --accent: var(--explorer-accent); --tint: var(--explorer-tint); }
    .creator  { --accent: var(--creator-accent);  --tint: var(--creator-tint);  }

    /* ─── Reassurance text ───────────────────────────────── */
    .reassurance {
      margin-top: 24px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      line-height: 1.5;
      color: var(--secondary);
      text-align: center;
    }

    /* ─── iPad landscape ─────────────────────────────────── */
    .ipad {
      width: 1024px;
      height: 768px;
      border-radius: 24px;
      background: #1a1a1a;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 0 0 2px #3a3a3a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .ipad .screen {
      border-radius: 22px;
    }
    .ipad .scroll-area {
      padding: 32px 32px 48px;
      align-items: center;
    }
    .ipad .screen-header {
      font-size: 36px;
      max-width: 560px;
      align-self: center;
    }
    .ipad .cards {
      max-width: 560px;
      width: 100%;
      align-self: center;
      gap: 20px;
      margin-top: 40px;
    }
    .ipad .tier-card {
      height: 112px;
    }
    .ipad .card-icon-well {
      width: 96px;
    }
    .ipad .card-icon-well svg {
      width: 56px;
      height: 56px;
    }
    .ipad .card-tier-name { font-size: 22px; }
    .ipad .card-age       { font-size: 15px; }
    .ipad .card-desc      { font-size: 15px; }
    .ipad .reassurance    { font-size: 15px; max-width: 560px; }

    /* ─── Entrance animations ────────────────────────────── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .screen-header { animation: fadeDown 0.4s ease 0.1s both; }
    .tier-card:nth-child(1) { animation: slideRight 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.2s both; }
    .tier-card:nth-child(2) { animation: slideRight 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.32s both; }
    .tier-card:nth-child(3) { animation: slideRight 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.44s both; }
    .reassurance { animation: fadeIn 0.4s ease 0.6s both; }
  </style>
</head>
