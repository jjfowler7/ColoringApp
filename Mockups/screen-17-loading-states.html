<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390px, initial-scale=1.0" />
  <title>PaperBrush — Loading & Skeleton States</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:     #FFF8F0;
      --canvas-bg: #FFFDF9;
      --teal:      #0EA5A0;
      --navy:      #1B2A4A;
      --coral:     #F06449;
      --secondary: #666666;
      --divider:   #E8E0D8;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 48px;
      padding: 48px;
      align-items: start;
      justify-items: center;
      background: #C8C0AE;
      font-family: 'Nunito Sans', sans-serif;
    }

    .device-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .device-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
      text-align: center;
      max-width: 200px;
    }

    /* ─── iPhone shell ───────────────────────────────────── */
    .iphone {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #1a1a1a;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 0 0 2px #3a3a3a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 50;
    }

    /* ─── Screen ─────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
      background: var(--cream);
      display: flex;
      flex-direction: column;
    }

    /* ════════════════════════════════════════════════════════
       SHARED STATUS & NAV
       ════════════════════════════════════════════════════════ */
    .status-bar {
      height: 54px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      background: var(--canvas-bg);
      z-index: 2;
    }
    .status-time {
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 15px;
      color: var(--navy);
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .status-icons svg { fill: var(--navy); }

    .top-bar {
      height: 44px; flex-shrink: 0;
      background: var(--canvas-bg);
      border-bottom: 1px solid var(--divider);
      display: flex; align-items: center;
      position: relative; z-index: 2;
    }
    .bar-back {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      margin-left: 8px; flex-shrink: 0;
    }
    .bar-back svg {
      width: 18px; height: 18px;
      stroke: var(--teal); stroke-width: 2.5;
      stroke-linecap: round; stroke-linejoin: round; fill: none;
    }
    .bar-title {
      position: absolute; left: 0; right: 0;
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 18px;
      color: var(--navy); pointer-events: none;
    }
    .bar-right { margin-left: auto; display: flex; align-items: center; }
    .bar-icon { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
    .bar-icon svg { fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .bar-icon.teal  svg { stroke: var(--teal); }

    /* ────────────────────────────────────────────────────── */
    /* SHIMMER ANIMATION FOR SKELETON STATES               */
    /* ────────────────────────────────────────────────────── */
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .skeleton {
      background: linear-gradient(90deg, #E8E0D8 25%, #F0EAE2 50%, #E8E0D8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* ════════════════════════════════════════════════════════
       SKELETON — Content Browser
       ════════════════════════════════════════════════════════ */
    .pills-row {
      margin-top: 16px; padding-left: 16px;
      display: flex; gap: 8px; overflow: hidden;
      padding-right: 16px;
    }

    .skeleton-pill {
      height: 36px; flex: 1; max-width: 120px;
      border-radius: 9999px; flex-shrink: 0;
      background: linear-gradient(90deg, #E8E0D8 25%, #F0EAE2 50%, #E8E0D8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .section-header {
      margin: 20px 16px 0;
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 22px;
      color: var(--navy);
    }

    .page-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 16px 16px 0;
      flex: 1; overflow: hidden;
    }

    .skeleton-card {
      background: linear-gradient(90deg, #E8E0D8 25%, #F0EAE2 50%, #E8E0D8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 16px;
      height: 190px;
      position: relative;
      overflow: hidden;
    }

    /* Skeleton text lines inside cards */
    .skeleton-text-area {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 58px;
      padding: 8px 10px 9px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 4px;
    }

    .skeleton-line {
      height: 10px;
      background: linear-gradient(90deg, #E8E0D8 25%, #F0EAE2 50%, #E8E0D8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    .skeleton-line.title {
      width: 80%;
    }

    .skeleton-line.subtitle {
      width: 50%;
      opacity: 0.8;
    }

    /* ════════════════════════════════════════════════════════
       CANVAS LOADING STATE
       ════════════════════════════════════════════════════════ */
    .toolbar {
      height: 52px;
      flex-shrink: 0;
      background: var(--canvas-bg);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 2;
    }

    .toolbar-button {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .canvas-area {
      flex: 1;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Loading spinner (circular) */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(14,165,160,0.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .loading-text {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400; font-size: 14px;
      color: var(--secondary);
    }

    /* Color tray and brush toolbar at bottom */
    .color-tray {
      height: 64px;
      flex-shrink: 0;
      background: #ffffff;
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      z-index: 2;
    }

    .color-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .brush-toolbar {
      height: 52px;
      flex-shrink: 0;
      background: var(--canvas-bg);
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 16px;
      z-index: 2;
    }

    .brush-button {
      width: 36px; height: 36px;
      border-radius: 9px;
      background: #ffffff;
      border: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* ════════════════════════════════════════════════════════
       GALLERY SKELETON
       ════════════════════════════════════════════════════════ */
    .gallery-header {
      height: 44px;
      flex-shrink: 0;
      background: var(--canvas-bg);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      padding: 0 16px;
      position: relative;
      z-index: 2;
    }

    .gallery-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 18px;
      color: var(--navy);
      flex: 1;
    }

    .gallery-add {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
    }

    .gallery-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 16px 16px 0;
      flex: 1; overflow: hidden;
    }

    .skeleton-gallery-card {
      background: linear-gradient(90deg, #E8E0D8 25%, #F0EAE2 50%, #E8E0D8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 16px;
      height: 220px;
    }
  </style>
</head>
