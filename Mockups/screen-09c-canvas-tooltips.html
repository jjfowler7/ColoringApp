<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390px, initial-scale=1.0" />
  <title>PaperBrush — Canvas Tooltips (Onboarding)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design tokens ──────────────────────────────────── */
    :root {
      --cream:     #FFF8F0;
      --canvas-bg: #FFFDF9;
      --teal:      #0EA5A0;
      --navy:      #1B2A4A;
      --coral:     #F06449;
      --gold:      #F5A623;
      --sage:      #7CB686;
      --lavender:  #B8A9E8;
      --sky:       #6BB8E8;
      --peach:     #FCBFA0;
      --secondary: #666666;
      --divider:   #E8E0D8;
    }

    /* ─── Page shell ─────────────────────────────────────── */
    html, body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      padding: 48px;
      align-items: flex-start;
      justify-content: center;
      background: #C8C0AE;
      font-family: 'Nunito Sans', sans-serif;
    }

    .device-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .device-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
    }

    /* ─── iPhone shell ───────────────────────────────────── */
    .iphone {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #1a1a1a;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 0 0 2px #3a3a3a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 30;
    }

    /* ─── Screen ─────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
      background: var(--canvas-bg);
      display: flex;
      flex-direction: column;
    }

    /* ─── Status bar ─────────────────────────────────────── */
    .status-bar {
      height: 54px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      background: var(--canvas-bg);
      z-index: 20;
    }
    .status-time {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--navy);
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .status-icons svg { fill: var(--navy); }

    /* ─── TOP TOOLBAR ────────────────────────────────────– */
    .top-toolbar {
      height: 44px;
      flex-shrink: 0;
      background: var(--canvas-bg);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      padding: 0;
      position: relative;
      z-index: 10;
    }

    .toolbar-back {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      margin-left: 8px;
      cursor: pointer; flex-shrink: 0;
      border-radius: 9999px;
    }
    .toolbar-back svg {
      width: 18px; height: 18px;
      stroke: var(--teal);
      stroke-width: 2.5;
      stroke-linecap: round; stroke-linejoin: round;
      fill: none;
    }

    .toolbar-title {
      position: absolute;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: var(--navy);
      pointer-events: none;
      letter-spacing: -0.1px;
    }

    .toolbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
    }
    .toolbar-icon {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 9999px;
    }
    .toolbar-icon svg {
      fill: none;
      stroke: var(--teal);
      stroke-width: 1.8;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .toolbar-dots {
      display: flex;
      gap: 3.5px;
      align-items: center;
    }
    .toolbar-dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--teal);
      display: block;
    }

    /* ─── CANVAS AREA ────────────────────────────────────── */
    .canvas-area {
      flex: 1;
      background: #ffffff;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    .canvas-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ─── BRUSH TOOLBAR ──────────────────────────────────– */
    .brush-toolbar {
      height: 56px;
      flex-shrink: 0;
      background: var(--canvas-bg);
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 4px;
      position: relative;
      z-index: 11;
    }

    .brush-btn {
      width: 48px; height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      border: none;
      background: transparent;
      transition: transform 0.15s;
    }
    .brush-btn:active { transform: scale(0.9); }

    .brush-btn svg {
      width: 32px; height: 32px;
      position: relative;
      z-index: 1;
    }

    /* ─── COLOR TRAY ─────────────────────────────────────– */
    .color-tray-wrap {
      height: 48px;
      flex-shrink: 0;
      background: var(--canvas-bg);
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: center;
      position: relative;
      z-index: 11;
    }

    .color-tray-wrap::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 32px;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(to right, var(--canvas-bg), transparent);
    }

    .color-tray {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px 0 16px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    .color-tray::-webkit-scrollbar { display: none; }

    .swatch {
      width: 32px; height: 32px;
      border-radius: 9999px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.15s;
      position: relative;
    }
    .swatch:active { transform: scale(0.88); }

    .swatch.selected {
      width: 40px;
      height: 40px;
      outline: 3px solid #ffffff;
      outline-offset: 1px;
      box-shadow: 0 0 0 1.5px rgba(27,42,74,0.15), 0 2px 8px rgba(14,165,160,0.3);
    }

    .tray-add-wrap {
      flex-shrink: 0;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 12px 0 4px;
      border-left: 1px solid var(--divider);
      background: var(--canvas-bg);
    }

    .swatch-add {
      width: 32px;
      height: 32px;
      border-radius: 9999px;
      flex-shrink: 0;
      cursor: pointer;
      border: 2px dashed var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: transform 0.15s;
    }
    .swatch-add:active { transform: scale(0.92); }
    .swatch-add svg {
      width: 14px;
      height: 14px;
      stroke: var(--secondary);
      stroke-width: 2;
      stroke-linecap: round;
      fill: none;
    }

    /* ─── CONTROL BAR ────────────────────────────────────– */
    .control-bar {
      height: 40px;
      flex-shrink: 0;
      background: var(--canvas-bg);
      display: flex;
      align-items: center;
      padding: 0 8px;
      position: relative;
      z-index: 11;
    }

    .ctrl-btn {
      width: 44px; height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 9999px;
      border: none;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .ctrl-btn:active { background: rgba(14,165,160,0.1); }
    .ctrl-btn svg {
      width: 22px; height: 22px;
      stroke: var(--teal);
      stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
      fill: none;
    }

    .size-slider-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .size-slider-track {
      width: 200px;
      height: 6px;
      border-radius: 9999px;
      background: var(--divider);
      position: relative;
    }
    .size-slider-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 55%;
      background: var(--teal);
      border-radius: 9999px;
    }
    .size-slider-thumb {
      position: absolute;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      border-radius: 9999px;
      background: #ffffff;
      box-shadow: 0 4px 16px rgba(27,42,74,0.10);
      border: 1px solid rgba(27,42,74,0.08);
      cursor: grab;
    }

    /* ─── TOOLTIP STYLES ─────────────────────────────────– */
    .tooltip-pill {
      position: absolute;
      background: rgba(27,42,74,0.9);
      border-radius: 9999px;
      padding: 8px 16px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #FFF8F0;
      white-space: nowrap;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(27,42,74,0.3);
    }

    /* Arrow pointing down */
    .tooltip-pill::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid rgba(27,42,74,0.9);
    }

    /* iPhone 2: Tooltip on + button (right-aligned) */
    .tooltip-right {
      right: 14px !important;
      left: auto !important;
    }
    .tooltip-right::after {
      right: 14px;
      left: auto;
      transform: translateX(50%);
    }

    /* ─── COMPLETION OVERLAY ─────────────────────────────– */
    .completion-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(to bottom, rgba(255,255,255,0), #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .completion-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--navy);
      text-align: center;
      margin-bottom: 24px;
    }

    /* Bouncing arrow */
    @keyframes bounceDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    .bounce-arrow {
      font-size: 24px;
      color: var(--navy);
      animation: bounceDown 1s ease-in-out infinite;
      margin-bottom: 16px;
    }

    /* Save button inside completion overlay */
    .save-btn-glow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: calc(100% - 128px);
      height: 48px;
      border-radius: 10px;
      background: var(--teal);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 16px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(14,165,160,0.30);
      animation: glowPulse 2s ease-in-out infinite;
    }

    /* Glow effect */
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 16px 4px rgba(14,165,160,0.3); }
      50% { box-shadow: 0 0 32px 8px rgba(14,165,160,0.6); }
    }

    /* Dimmed layers for completion view */
    .dimmed {
      opacity: 0.3;
    }

    /* ─── Entrance animations ────────────────────────────– */
    @keyframes fadeInOverlay { from { opacity:0 } to { opacity:1 } }
    .completion-overlay { animation: fadeInOverlay 0.5s ease 0.4s both; }

    /* ─── Bottom safe area ───────────────────────────────── */
    .safe-area-bottom {
      height: 34px;
      flex-shrink: 0;
      background: var(--canvas-bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .home-indicator {
      width: 120px;
      height: 5px;
      background: var(--navy);
      border-radius: 9999px;
      opacity: 0.18;
    }
  </style>
</head>

          <!-- Forehead stripe outlines (right side) -->
          <path d="M215 120 Q205 108 195 115" fill="none" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
          <path d="M220 110 Q208 96 195 103" fill="none" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

          <!-- ── Small "zz" sleep bubbles top-right ── -->
          <text x="295" y="110" font-family="Nunito" font-weight="800" font-size="20" fill="#1B2A4A" opacity="0.18">z</text>
          <text x="316" y="88" font-family="Nunito" font-weight="800" font-size="16" fill="#1B2A4A" opacity="0.14">z</text>
          <text x="333" y="70" font-family="Nunito" font-weight="800" font-size="12" fill="#1B2A4A" opacity="0.10">z</text>

          <!-- ── Soft colored glow on colored side (blush overlay) ── -->
          <ellipse cx="130" cy="240" rx="80" ry="60" fill="#F5A623" opacity="0.04"/>

        </svg>
      </div>

      <!-- BRUSH TOOLBAR — DIMMED -->
      <div class="brush-toolbar dimmed">
        <button class="brush-btn" title="Crayon">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="13" y="3" width="6" height="18" rx="1.5" fill="#F5A623"/>
            <rect x="14.5" y="3" width="2" height="18" rx="1" fill="#FFD16A" opacity="0.6"/>
            <rect x="13" y="12" width="6" height="5" fill="#FFFDF9" opacity="0.5"/>
            <path d="M13 21 L16 29 L19 21Z" fill="#D4811A"/>
            <path d="M14.5 21 L16 27 L17.5 21Z" fill="#F5C842" opacity="0.6"/>
            <rect x="13" y="1.5" width="6" height="3" rx="1.5" fill="#D4811A"/>
          </svg>
        </button>
        <button class="brush-btn selected" title="Marker">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="12.5" y="2" width="7" height="20" rx="3.5" fill="#0EA5A0"/>
            <rect x="14" y="2" width="2.5" height="20" rx="1.2" fill="#3ECFCA" opacity="0.5"/>
            <rect x="12" y="18" width="8" height="3" rx="1.5" fill="#0B8A86"/>
            <path d="M13 21 Q16 20 19 21 L18 27 Q16 30 14 27Z" fill="#0EA5A0"/>
            <path d="M14.5 22 Q16 21.5 17.5 22 L17 26 Q16 28 15 26Z" fill="#3ECFCA" opacity="0.5"/>
            <rect x="18" y="3" width="2.5" height="10" rx="1.2" fill="#0B8A86"/>
            <circle cx="19.25" cy="3" r="1.5" fill="#0B8A86"/>
          </svg>
        </button>
        <button class="brush-btn" title="Watercolor">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="14" y="2" width="4" height="18" rx="2" fill="#8FBCD4"/>
            <rect x="15" y="2" width="1.5" height="18" rx="0.75" fill="#B8D8EC" opacity="0.6"/>
            <rect x="12.5" y="17" width="7" height="4" rx="1" fill="#B0C4CE"/>
            <path d="M13 21 Q11 24 10 28 Q13 27 16 28 Q19 27 22 28 Q21 24 19 21Z" fill="#6BB8E8"/>
            <path d="M13.5 21 Q12 24.5 11.5 27 Q14 26.5 16 27 Q18 26.5 20.5 27 Q20 24.5 18.5 21Z" fill="#8DCCF0" opacity="0.6"/>
            <ellipse cx="16" cy="29.5" rx="2" ry="1.5" fill="#6BB8E8" opacity="0.5"/>
          </svg>
        </button>
        <button class="brush-btn" title="Pencil">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="13.5" y="2" width="5" height="22" rx="1" fill="#999"/>
            <rect x="15" y="2" width="1.8" height="22" rx="0.9" fill="#CCC" opacity="0.6"/>
            <rect x="13.5" y="1" width="5" height="3.5" rx="1" fill="#F5A6A6"/>
            <rect x="13" y="21" width="6" height="3" rx="0.5" fill="#B8C5D0"/>
            <path d="M13.5 24 L16 30 L18.5 24Z" fill="#D4956A"/>
            <path d="M15 27 L16 30 L17 27Z" fill="#444"/>
          </svg>
        </button>
        <button class="brush-btn" title="Spray">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="11" y="12" width="10" height="14" rx="2" fill="#7CB686"/>
            <rect x="12" y="12" width="3" height="14" rx="1" fill="#9ED4AA" opacity="0.5"/>
            <rect x="19" y="10" width="5" height="3" rx="1.5" fill="#5A9668"/>
            <rect x="23" y="9" width="2" height="5" rx="1" fill="#5A9668"/>
            <circle cx="26" cy="7"  r="1.2" fill="#7CB686" opacity="0.7"/>
            <circle cx="28" cy="10" r="0.9" fill="#7CB686" opacity="0.5"/>
            <circle cx="27" cy="13" r="0.8" fill="#7CB686" opacity="0.4"/>
            <circle cx="25" cy="6"  r="0.7" fill="#7CB686" opacity="0.3"/>
            <circle cx="29" cy="7.5" r="0.6" fill="#7CB686" opacity="0.3"/>
            <path d="M11 12 Q16 8 21 12Z" fill="#5A9668"/>
          </svg>
        </button>
        <button class="brush-btn" title="Glitter">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="15" y="14" width="3" height="15" rx="1.5" fill="#C8A94A" transform="rotate(20 16 22)"/>
            <polygon points="16,2 17.8,7.4 23.5,7.4 18.9,10.6 20.7,16 16,12.8 11.3,16 13.1,10.6 8.5,7.4 14.2,7.4" fill="#F5A623"/>
            <circle cx="24" cy="4"  r="1.5" fill="#F5A623" opacity="0.8"/>
            <circle cx="8"  cy="6"  r="1.2" fill="#F5A623" opacity="0.6"/>
            <circle cx="26" cy="14" r="1"   fill="#F5A623" opacity="0.5"/>
            <circle cx="6"  cy="16" r="0.8" fill="#F5A623" opacity="0.4"/>
            <path d="M25 8 V10 M24 9 H26" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
            <path d="M7 11 V13 M6 12 H8"  stroke="#F5A623" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
          </svg>
        </button>
        <button class="brush-btn" title="Stamp">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="12" y="2" width="8" height="10" rx="3" fill="#B8A9E8"/>
            <rect x="13.5" y="2" width="3" height="10" rx="1.5" fill="#CFC4F0" opacity="0.5"/>
            <rect x="9" y="12" width="14" height="6" rx="2" fill="#9C8DD0"/>
            <rect x="9" y="18" width="14" height="8" rx="1.5" fill="#B8A9E8"/>
            <rect x="8" y="24" width="16" height="3" rx="1.5" fill="#9C8DD0" opacity="0.5"/>
            <polygon points="16,19.5 16.8,21.8 19.2,21.8 17.3,23.1 18,25.4 16,24.1 14,25.4 14.7,23.1 12.8,21.8 15.2,21.8" fill="#ffffff" opacity="0.7"/>
          </svg>
        </button>
        <button class="brush-btn" title="Eraser">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="6" y="14" width="20" height="10" rx="3" fill="#FCBFA0" transform="rotate(-8 16 19)"/>
            <rect x="7" y="14" width="6" height="10" rx="3" fill="#F5876E" opacity="0.6" transform="rotate(-8 16 19)"/>
            <rect x="11" y="14" width="3" height="10" rx="0" fill="#F5A6A6" opacity="0.5" transform="rotate(-8 16 19)"/>
            <path d="M8 26 Q14 24 18 26" stroke="#E8E0D8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <circle cx="22" cy="27" r="1.2" fill="#FCBFA0" opacity="0.6"/>
            <circle cx="25" cy="25" r="0.9" fill="#FCBFA0" opacity="0.4"/>
            <circle cx="20" cy="28.5" r="0.7" fill="#FCBFA0" opacity="0.5"/>
          </svg>
        </button>
      </div>

      <!-- COLOR TRAY — DIMMED -->
      <div class="color-tray-wrap dimmed">
        <div class="color-tray">
          <div class="swatch" style="background:#E8412A;" title="Red"></div>
          <div class="swatch" style="background:#F06449;" title="Orange Red"></div>
          <div class="swatch" style="background:#F5A623;" title="Orange/Gold"></div>
          <div class="swatch" style="background:#F5E642;" title="Yellow"></div>
          <div class="swatch" style="background:#7CB686;" title="Green"></div>
          <div class="swatch" style="background:#0EA5A0;" title="Teal"></div>
          <div class="swatch" style="background:#6BB8E8;" title="Blue"></div>
          <div class="swatch" style="background:#B8A9E8;" title="Purple"></div>
          <div class="swatch" style="background:#F08EB0;" title="Pink"></div>
          <div class="swatch" style="background:#FCBFA0;" title="Peach"></div>
          <div class="swatch" style="background:#1B2A4A;" title="Navy"></div>
          <div class="swatch" style="background:#666666;" title="Gray"></div>
          <div class="swatch" style="background:#4A2C12;" title="Brown"></div>
          <div class="swatch" style="background:#FFFFFF; border: 1.5px solid #E8E0D8;" title="White"></div>
        </div>
        <div class="tray-add-wrap">
          <div class="swatch-add" title="Custom color">
            <svg viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
          </div>
        </div>
      </div>

      <!-- CONTROL BAR — DIMMED -->
      <div class="control-bar dimmed">
        <button class="ctrl-btn" title="Undo">
          <svg viewBox="0 0 22 22">
            <path d="M3 9 L3 3 M3 9 C3 9 6 2 13 3 C18 4 21 8 20 14 C19 18 15 21 10 20"/>
            <polyline points="3,3 3,9 9,9"/>
          </svg>
        </button>
        <div class="size-slider-wrap">
          <div class="size-slider-track">
            <div class="size-slider-fill"></div>
            <div class="size-slider-thumb"></div>
          </div>
        </div>
        <button class="ctrl-btn" title="Redo">
          <svg viewBox="0 0 22 22">
            <path d="M19 9 L19 3 M19 9 C19 9 16 2 9 3 C4 4 1 8 2 14 C3 18 7 21 12 20"/>
            <polyline points="19,3 19,9 13,9"/>
          </svg>
        </button>
      </div>

      <!-- COMPLETION OVERLAY -->
      <div class="completion-overlay">
        <div class="completion-text">You did it! Tap to save</div>
        <div class="bounce-arrow">▼</div>
        <button class="save-btn-glow">Save 💾</button>
      </div>

      <!-- Bottom safe area (hidden under overlay) -->
      <div class="safe-area-bottom" style="opacity: 0.3;">
        <div class="home-indicator"></div>
      </div>

    </div>
  </div>
  <div class="device-label">First completion → save prompt overlay</div>
</div>

</body>
</html>
