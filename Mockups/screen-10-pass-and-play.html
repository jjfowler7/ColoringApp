<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390px, initial-scale=1.0" />
  <title>PaperBrush — Pass & Play Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:     #FFF8F0;
      --canvas-bg: #FFFDF9;
      --teal:      #0EA5A0;
      --navy:      #1B2A4A;
      --coral:     #F06449;
      --gold:      #F5A623;
      --sky:       #6BB8E8;
      --sage:      #7CB686;
      --secondary: #666666;
      --divider:   #E8E0D8;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      padding: 48px;
      align-items: flex-start;
      justify-content: center;
      background: #C8C0AE;
      font-family: 'Nunito Sans', sans-serif;
    }

    .device-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .device-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
    }

    /* ─── iPhone shell ───────────────────────────────────── */
    .iphone {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #1a1a1a;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 0 0 2px #3a3a3a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 50;
    }

    /* ─── Screen ─────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
      background: var(--canvas-bg);
      display: flex;
      flex-direction: column;
    }

    /* ════════════════════════════════════════════════════════
       CANVAS BACKDROP (Explorer canvas, screen 3)
       ════════════════════════════════════════════════════════ */
    .status-bar {
      height: 54px; flex-shrink: 0;
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 28px 8px;
      background: var(--canvas-bg); z-index: 2;
    }
    .status-time {
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 15px; color: var(--navy);
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .status-icons svg { fill: var(--navy); }

    .top-toolbar {
      height: 44px; flex-shrink: 0;
      background: var(--canvas-bg);
      border-bottom: 1px solid var(--divider);
      display: flex; align-items: center;
      position: relative; z-index: 2;
    }
    .toolbar-back {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      margin-left: 8px; flex-shrink: 0;
    }
    .toolbar-back svg {
      width: 18px; height: 18px;
      stroke: var(--teal); stroke-width: 2.5;
      stroke-linecap: round; stroke-linejoin: round; fill: none;
    }
    .toolbar-title {
      position: absolute; left: 0; right: 0;
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 16px; color: var(--navy);
      pointer-events: none;
    }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; }
    .toolbar-icon {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .toolbar-icon svg {
      fill: none; stroke: var(--teal);
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
    .toolbar-dots { display: flex; gap: 3.5px; align-items: center; }
    .toolbar-dots span { width: 4px; height: 4px; border-radius: 50%; background: var(--teal); display: block; }

    /* Canvas area — shows the cat artwork behind everything */
    .canvas-area {
      flex: 1; background: #ffffff;
      position: relative; overflow: hidden; min-height: 0;
    }
    .canvas-area svg { width: 100%; height: 100%; display: block; }

    /* Brush toolbar (just the strip, icons simplified for backdrop) */
    .brush-toolbar {
      height: 56px; flex-shrink: 0;
      background: var(--canvas-bg);
      border-top: 1px solid var(--divider);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 4px;
    }
    .b-icon {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 9999px;
    }
    .b-icon.selected::before {
      content: '';
      position: absolute;
      width: 48px; height: 48px;
      border-radius: 9999px;
      background: rgba(14,165,160,0.15);
    }
    .b-icon svg { width: 30px; height: 30px; position: relative; z-index: 1; fill: none; }

    /* Color tray */
    .color-tray-wrap {
      height: 48px; flex-shrink: 0;
      background: var(--canvas-bg);
      border-top: 1px solid var(--divider);
      display: flex; align-items: center; position: relative;
    }
    .color-tray-wrap::before {
      content: ''; position: absolute;
      top: 0; bottom: 0; left: 0; width: 32px; z-index: 2;
      pointer-events: none;
      background: linear-gradient(to right, var(--canvas-bg), transparent);
    }
    .color-tray {
      flex: 1; height: 100%;
      display: flex; align-items: center;
      gap: 8px; padding: 0 12px 0 16px;
      overflow: hidden;
    }
    .sw {
      width: 32px; height: 32px;
      border-radius: 9999px; flex-shrink: 0;
    }
    .sw.sel {
      width: 40px; height: 40px;
      outline: 3px solid #ffffff; outline-offset: 1px;
      box-shadow: 0 0 0 1.5px rgba(27,42,74,0.15);
    }
    .tray-add-wrap {
      flex-shrink: 0; height: 100%;
      display: flex; align-items: center;
      padding: 0 12px 0 4px;
      border-left: 1px solid var(--divider);
      background: var(--canvas-bg);
    }
    .sw-add {
      width: 32px; height: 32px;
      border-radius: 9999px;
      border: 2px dashed var(--secondary);
      display: flex; align-items: center; justify-content: center;
      background: transparent;
    }
    .sw-add svg { width: 14px; height: 14px; stroke: var(--secondary); stroke-width: 2; fill: none; stroke-linecap: round; }

    /* Control bar */
    .control-bar {
      height: 40px; flex-shrink: 0;
      background: var(--canvas-bg);
      display: flex; align-items: center; padding: 0 8px;
    }
    .ctrl-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 9999px; border: none; background: transparent;
    }
    .ctrl-btn svg { width: 22px; height: 22px; stroke: var(--teal); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .slider-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
    .slider-track { width: 200px; height: 6px; border-radius: 9999px; background: var(--divider); position: relative; }
    .slider-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 55%; background: var(--teal); border-radius: 9999px; }
    .slider-thumb { position: absolute; top: 50%; left: 55%; transform: translate(-50%,-50%); width: 24px; height: 24px; border-radius: 9999px; background: #ffffff; box-shadow: 0 4px 16px rgba(27,42,74,0.10); }

    .safe-area { height: 34px; flex-shrink: 0; background: var(--canvas-bg); display: flex; align-items: center; justify-content: center; }
    .home-indicator { width: 120px; height: 5px; background: var(--navy); border-radius: 9999px; opacity: 0.18; }

    /* ════════════════════════════════════════════════════════
       SCRIM
       ════════════════════════════════════════════════════════ */
    .scrim {
      position: absolute; inset: 0;
      background: rgba(27,42,74,0.40);
      z-index: 10; border-radius: 48px;
    }

    /* ════════════════════════════════════════════════════════
       BOTTOM SHEET
       ════════════════════════════════════════════════════════ */
    .sheet {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: #ffffff;
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -16px 48px rgba(27,42,74,0.18);
      z-index: 20;
      overflow: hidden;
      animation: sheetUp 0.42s cubic-bezier(0.34,1.15,0.64,1) both;
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); opacity: 0.75; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Scrollable inner */
    .sheet-scroll {
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      padding: 0 24px 34px; /* 34pt for home indicator */
      max-height: 490px;
    }
    .sheet-scroll::-webkit-scrollbar { display: none; }

    /* Drag handle */
    .drag-handle {
      width: 36px; height: 5px;
      background: var(--divider);
      border-radius: 9999px;
      margin: 12px auto 0;
    }

    /* Sheet title */
    .sheet-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 24px;
      color: var(--navy);
      margin-top: 20px;
      letter-spacing: -0.3px;
    }

    /* Player section */
    .player-section { margin-top: 24px; }
    .player-section + .player-section { margin-top: 20px; }

    .player-label {
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 14px;
      color: var(--secondary);
    }

    /* Avatar row */
    .avatar-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 9999px;
      flex-shrink: 0;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1);
    }
    .avatar:active { transform: scale(0.9); }

    /* Selected ring — P1: teal, P2: sky */
    .avatar.sel-teal {
      outline: 3px solid var(--teal);
      outline-offset: 2px;
      box-shadow: 0 0 0 1px rgba(14,165,160,0.12);
    }
    .avatar.sel-sky {
      outline: 3px solid var(--sky);
      outline-offset: 2px;
      box-shadow: 0 0 0 1px rgba(107,184,232,0.12);
    }

    .avatar svg { width: 40px; height: 40px; display: block; }

    /* Name input */
    .name-input {
      margin-top: 8px;
      width: 100%; height: 48px;
      border: 1.5px solid var(--divider);
      border-radius: 10px;
      background: #ffffff;
      padding: 0 14px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400; font-size: 16px;
      color: var(--secondary);
      outline: none;
      display: flex; align-items: center;
      /* rendered as a visual mock — not interactive */
    }

    /* Add player */
    .add-player {
      margin-top: 12px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 14px;
      color: var(--teal);
      cursor: pointer;
      display: flex; align-items: center; gap: 4px;
    }

    /* Turn time section */
    .turn-time-section { margin-top: 24px; }
    .turn-label {
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 14px;
      color: var(--secondary);
    }

    /* Segmented control */
    .seg-control {
      margin-top: 8px;
      width: 100%; height: 44px;
      background: var(--canvas-bg);
      border-radius: 10px;
      border: 1px solid var(--divider);
      display: flex;
      overflow: hidden;
    }
    .seg {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-right: 1px solid var(--divider);
    }
    .seg:last-child { border-right: none; }
    .seg.active {
      background: var(--teal);
      color: #ffffff;
      border-color: transparent;
    }
    .seg:not(.active) { color: var(--navy); background: var(--canvas-bg); }

    /* Start button */
    .btn-start {
      margin-top: 24px;
      width: 100%; height: 56px;
      background: var(--teal);
      border: none; border-radius: 10px;
      box-shadow: 0 4px 16px rgba(14,165,160,0.25);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn-start:active { transform: scale(0.97); }
    .btn-start span {
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 18px;
      color: #ffffff; letter-spacing: -0.1px;
    }

    /* ─── Stagger animations on sheet content ────────────── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .sheet-title        { animation: fadeUp 0.3s ease 0.28s both; }
    .player-section:nth-child(1) { animation: fadeUp 0.3s ease 0.34s both; }
    .player-section:nth-child(2) { animation: fadeUp 0.3s ease 0.40s both; }
    .add-player         { animation: fadeUp 0.3s ease 0.46s both; }
    .turn-time-section  { animation: fadeUp 0.3s ease 0.50s both; }
    .btn-start          { animation: fadeUp 0.3s ease 0.55s both; }
  </style>
</head>
