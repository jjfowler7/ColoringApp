<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390px, initial-scale=1.0" />
  <title>PaperBrush — Gallery Full-Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1B2A4A;
      --teal:    #0EA5A0;
      --cream:   #FFF8F0;
      --sage:    #7CB686;
      --secondary: #666666;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      padding: 48px;
      align-items: flex-start;
      justify-content: center;
      background: #1A1714;
      font-family: 'Nunito Sans', sans-serif;
    }

    .device-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .device-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      color: #666;
      letter-spacing: 0.04em;
    }

    /* ─── iPhone shell ───────────────────────────────────── */
    .iphone {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #111;
      box-shadow: 0 24px 80px rgba(0,0,0,0.55), inset 0 0 0 2px #2a2a2a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #111;
      border-radius: 20px;
      z-index: 40;
    }

    /* ─── Screen — pure white to let artwork breathe ─────── */
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
      background: #ffffff;
    }

    /* ─── ARTWORK fills the full screen ─────────────────── */
    .artwork-full {
      position: absolute;
      inset: 24px;
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
    }
    .artwork-full svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ─── STATUS BAR (light text on dark-tinted bar) ─────── */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 54px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      z-index: 20;
      /* matches the top-bar tint below it */
      background: rgba(27,42,74,0.40);
    }
    .status-time {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: rgba(255,255,255,0.88);
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .status-icons svg { fill: rgba(255,255,255,0.75); }

    /* ─── TOP BAR — overlaid, 40% navy ──────────────────── */
    .top-bar {
      position: absolute;
      top: 54px; left: 0; right: 0;
      height: 44px;
      background: rgba(27,42,74,0.40);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      z-index: 20;
      padding: 0;
    }

    /* Close button */
    .btn-close {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      margin-left: 8px;
      flex-shrink: 0;
      cursor: pointer;
      border-radius: 9999px;
    }
    .btn-close svg {
      width: 16px; height: 16px;
      stroke: #ffffff;
      stroke-width: 2.5;
      stroke-linecap: round;
      fill: none;
    }

    /* Right icon group */
    .bar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0;
      margin-right: 4px;
    }
    .bar-icon {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border-radius: 9999px;
    }
    .bar-icon svg {
      fill: none;
      stroke: #ffffff;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ─── SWIPE HINT CHEVRONS ────────────────────────────── */
    /* Sit on the .iphone shell, OUTSIDE .screen so border-radius clip doesn't hide them */
    .swipe-left,
    .swipe-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      z-index: 35;
      pointer-events: none;
      /* pill background so they read against any artwork color */
      background: rgba(27,42,74,0.38);
      border-radius: 9999px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .swipe-left  { left: 10px; }
    .swipe-right { right: 10px; }
    .swipe-left svg,
    .swipe-right svg {
      width: 16px; height: 26px;
      stroke: rgba(255,255,255,0.85);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    /* ─── BOTTOM INFO STRIP ──────────────────────────────── */
    .info-strip {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 120px;
      /* gradient from transparent at top → cream at bottom */
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,248,240,0.70) 30%,
        rgba(255,248,240,0.96) 60%,
        #FFF8F0 100%
      );
      border-radius: 0 0 48px 48px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 28px 28px;
      z-index: 20;
    }

    .info-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--navy);
      line-height: 1.2;
      letter-spacing: -0.2px;
    }
    .info-meta {
      margin-top: 3px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: var(--secondary);
    }
    .info-status {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--sage);
      flex-shrink: 0;
    }
    .status-label {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--secondary);
    }

    /* ─── Entrance animation ─────────────────────────────── */
    @keyframes fadeIn  { from { opacity:0 }                     to { opacity:1 } }
    @keyframes scaleIn { from { opacity:0; transform:scale(0.96) } to { opacity:1; transform:scale(1) } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:translateY(0) } }
    @keyframes slideUp   { from { opacity:0; transform:translateY(12px)  } to { opacity:1; transform:translateY(0) } }

    .artwork-full  { animation: scaleIn   0.45s cubic-bezier(0.34,1.2,0.64,1) 0.05s both; }
    .status-bar,
    .top-bar       { animation: slideDown 0.35s ease 0.1s both; }
    .swipe-left,
    .swipe-right   { animation: fadeIn    0.5s ease 0.4s  both; }
    .info-strip    { animation: slideUp   0.38s ease 0.2s  both; }
  </style>
</head>
